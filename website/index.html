<!DOCTYPE html>
<html>
<head>
  <title>Chat Extractor</title>
</head>
<body>
  <h3>Paste Chat Link</h3>
  <input id="link" style="width:400px" />
  <button id="extract">Extract</button>

  <pre id="status"></pre>

  <script>
  const EXTENSION_ID = "idfdncdbmpffahiapabgbmhbglagnbde";

  async function checkExtension() {
    try {
      const res = await chrome.runtime.sendMessage(
        EXTENSION_ID,
        { type: "PING" }
      );

      if (res.status === "ALIVE") {
        document.getElementById("status").textContent =
          "✅ Extension detected. Ready to extract.";
        return true;
      }
    } catch (e) {}

    document.getElementById("status").textContent =
      "❌ Extension not installed. Please install it first.";
    return false;
  }

  document.getElementById("extract").onclick = async () => {
    const ready = await checkExtension();
    if (!ready) return;

    const chatUrl = document.getElementById("link").value;

    document.getElementById("status").textContent = "Extracting...";

    const res = await chrome.runtime.sendMessage(
      EXTENSION_ID,
      {
        type: "START_EXTRACTION",
        chatUrl
      }
    );

    document.getElementById("status").textContent =
      JSON.stringify(res, null, 2);
  };

  // Run check on page load
  checkExtension();
</script>

</body>
</html>
